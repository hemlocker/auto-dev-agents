# 全自动开发智能体系统配置
# 基于 OpenClaw 平台 - 真正的全自动

version: "2.0"

# 项目配置
projects:
  dir: "projects"
  default: "demo_project"
  
  # 项目类型（影响子任务拆分）
  # 可选: fullstack, backend_only, frontend_only, django_monolith, microservices, custom
  type: "fullstack"

# 工作流配置
workflow:
  # 预设模板: full-pdca | dev-only | test-only | custom
  template: "full-pdca"
  
  # 子任务拆分策略
  # - module: 按功能模块拆分（垂直切片，每个模块包含所有层）
  # - layer: 按技术层拆分（水平切片，每层包含所有模块）
  # - auto: 根据模块数量自动选择（≤2模块用layer，>2用module）
  subtask_strategy: "auto"
  
  # 阶段定义（template=custom 时生效）
  stages:
    - name: requirement
      phase: plan
      input: input/
      output: output/requirements/
      prompt: prompts/requirement/system.md
      timeout: 1800
      
    - name: design
      phase: plan
      input: output/requirements/
      output: output/design/
      depends_on: [requirement]
      
    - name: development
      phase: do
      input: output/design/
      output: output/src/
      depends_on: [design]
      
    - name: testing
      phase: do
      input: output/src/
      output: output/tests/
      depends_on: [development]
      
    - name: deployment
      phase: do
      input: output/tests/
      output: output/deploy/
      depends_on: [testing]
      
    - name: operations
      phase: check
      input: output/deploy/
      output: output/operations/
      depends_on: [deployment]
      
    - name: monitor
      phase: check
      input: output/
      output: output/monitor/
      depends_on: [operations]
      
    - name: optimizer
      phase: act
      input: output/monitor/
      output: output/optimizer/
      depends_on: [monitor]
  
  # 预设模板定义
  templates:
    full-pdca:
      stages: [requirement, design, development, testing, deployment, operations, monitor, optimizer]
    dev-only:
      stages: [requirement, design, development]
    test-only:
      stages: [development, testing]
    plan-do:
      stages: [requirement, design, development, testing, deployment]

# PDCA 循环配置
pdca:
  # 循环间隔（秒）
  cycle_interval_seconds: 60  # 1 分钟
  
  # 自动循环
  auto_loop: true
  
  # 最大循环次数（0 = 无限）
  max_cycles: 0

# 执行模式
execution:
  # 自动执行模式：无需对话
  mode: "auto"
  
  # 阶段延迟（秒）
  stage_delay_seconds: 30
  
  # 超时（秒）
  timeout_seconds: 1800  # 30 分钟
  
  # 子任务执行配置
  subtask:
    # 启用子任务拆分执行
    enabled: true
    
    # 子任务间延迟（秒）
    delay_seconds: 5
    
    # 失败时是否继续执行其他子任务
    continue_on_failure: true
  
  # 上下文限制配置
  # 模型限制: contextWindow=202752, maxTokens=16384
  context:
    # 最大输入 token 数
    # 计算: 202752 - 16384(输出) - 5000(系统提示) - 10000(安全边际) ≈ 171000
    max_input_tokens: 150000
    
    # 单文件最大 KB（警告阈值）
    # 150KB ≈ 75000 token (中文)
    max_file_size_kb: 150
    
    # 最大文件数（超过则分批）
    max_file_count: 50
    
    # 分批时每批文件数
    batch_size: 15
    
    # 输出预留 token
    output_reserve_tokens: 16384

# 反馈机制
feedback:
  # 问题自动转工单
  issues_to_tickets: true

  # 优化建议自动转需求
  suggestions_to_requirements: true

# 通知配置（仅在关键节点通知）
notification:
  channel: "feishu"
  events:
    - on_cycle_complete      # 每轮完成
    - on_error               # 出错时
    - on_new_issues          # 发现新问题

# 输入监控配置
input_monitor:
  check_interval_seconds: 30    # 文件变化检查间隔
  default_timeout_seconds: 1800 # 监控子智能体超时
  monitor_sleep_seconds: 10     # 监控循环休眠间隔

# Token 估算配置（按内容类型分段比率）
token_estimation:
  # chars/token 比率，越小表示编码密度越高
  ratio_cjk: 1.8       # 中文（简体/繁体）：~1.8 chars/token
  ratio_latin: 4.0     # 英文/纯文本：~4.0 chars/token
  ratio_code: 3.5       # 代码文件：~3.5 chars/token
  ratio_mixed: 2.5     # 中英混合：~2.5 chars/token
  # 采样配置
  max_sample_mb: 2      # 内容检测时最多读取前 2MB
  cjk_ratio_threshold: 0.15   # CJK 字符占比阈值（>15% 视为中文）
  mixed_ratio_threshold: 0.02 # 混合阈值（>2% 视为混合）

# 执行引擎配置
engine:
  http_timeout_seconds: 30      # HTTP 请求超时（常规）
  http_timeout_short: 10         # HTTP 请求超时（短轮询）
  subtask_timeout_add: 5         # 子任务 spawn 时追加到超时
  wait_active_max_seconds: 300   # 等待活跃子智能体最大秒数
  wait_active_first_seconds: 60   # 首次等待子智能体最大秒数
  stage_timeout_default: 1800   # 阶段默认超时（秒）
  stage_timeout_max: 3600        # 阶段完成等待最大超时（秒）
  subtask_in_progress_threshold: 1800  # 子任务超时阈值（秒，超此认为失败可重试）
  status_print_interval_seconds: 30    # 状态打印间隔